<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="theme-name" content="quixlab" />

    <title>Teacher Dashboard - My Classes</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" crossorigin="anonymous">

    <link rel="icon" type="image/png" sizes="16x16" th:href="@{/images/favicon.png}">
    <link th:href="@{/plugins/pg-calendar/css/pignose.calendar.min.css}" rel="stylesheet">
    <link th:href="@{/plugins/chartist/css/chartist.min.css}" rel="stylesheet">
    <link th:href="@{/plugins/chartist-plugin-tooltips/css/chartist-plugin-tooltip.css}" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <link th:href="@{/css/teacher-dashboard.css}" rel="stylesheet">

    <style>
        /* ── BASE RESET ── */
        body {
            background-color: #020810 !important;
            position: relative;
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }

        /* ── THEMED HEADER & NAV (Glassmorphism) ── */
        .header, .nav-header {
            background: rgba(8, 20, 45, 0.7) !important;
            backdrop-filter: blur(20px) !important;
            -webkit-backdrop-filter: blur(20px) !important;
            border-bottom: 1px solid rgba(50, 130, 255, 0.2) !important;
        }

        /* Remove Large Background Logo and Nav Logo */
        .nav-header .brand-logo img,
        .nav-header .brand-logo {
            display: none !important;
        }

        /* Heading Text Glow */
        .header-content h1, .nav-header .brand-title, .brand-logo h3 {
            color: #e0f0ff !important;
            text-shadow: 0 0 15px rgba(60, 150, 255, 0.6);
            font-weight: 700;
        }

        /* ── BACKGROUND CANVAS ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                    radial-gradient(ellipse 80% 60% at 50% 50%,
                    rgba(30, 120, 255, 0.18) 0%,
                    rgba(0, 200, 255, 0.07) 30%,
                    transparent 65%),
                    radial-gradient(ellipse 50% 40% at 50% 50%,
                    rgba(255, 255, 255, 0.04) 0%,
                    transparent 60%),
                    radial-gradient(ellipse 120% 100% at 50% 100%,
                    rgba(10, 40, 90, 0.6) 0%,
                    transparent 60%),
                    linear-gradient(160deg,
                    #020810 0%,
                    #060f1e 30%,
                    #071325 55%,
                    #040c1a 80%,
                    #020810 100%);
            z-index: -2;
            animation: pulseGlow 6s ease-in-out infinite alternate;
        }

        @keyframes pulseGlow {
            0%   { opacity: 0.85; }
            100% { opacity: 1; }
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background:
                    radial-gradient(ellipse 60% 30% at 20% 80%,
                    rgba(0, 80, 200, 0.12) 0%, transparent 70%),
                    radial-gradient(ellipse 40% 25% at 80% 20%,
                    rgba(0, 160, 255, 0.09) 0%, transparent 70%),
                    radial-gradient(ellipse 35% 20% at 70% 75%,
                    rgba(20, 60, 140, 0.15) 0%, transparent 60%);
            z-index: -2;
            animation: waveShift 10s ease-in-out infinite alternate;
        }

        @keyframes waveShift {
            0%   { transform: scale(1) translateY(0px); opacity: 0.6; }
            100% { transform: scale(1.08) translateY(-12px); opacity: 1; }
        }

        /* ── PARTICLE CANVAS ── */
        #particles-canvas {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
        }

        /* ── GRID OVERLAY ── */
        .grid-overlay {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            background-image:
                    linear-gradient(rgba(30, 120, 255, 0.04) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(30, 120, 255, 0.04) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(ellipse 70% 70% at 50% 50%,
            transparent 30%, black 100%);
        }

        /* ── MAIN LAYOUT FIXES ── */
        .content-body {
            background: transparent !important;
        }

        #main-wrapper {
            background: transparent !important;
        }

        /* ── CARDS (Glassmorphism) ── */
        .card {
            background: linear-gradient(135deg,
            rgba(8, 20, 45, 0.82) 0%,
            rgba(15, 35, 75, 0.78) 40%,
            rgba(20, 55, 100, 0.75) 100%) !important;
            border: 1px solid rgba(50, 130, 255, 0.25) !important;
            box-shadow: 0 8px 32px rgba(0, 30, 60, 0.6) !important;
            backdrop-filter: blur(24px) saturate(1.4) !important;
            border-radius: 20px !important;
            color: #e0f0ff !important;
        }

        .breadcrumb {
            background: transparent !important;
        }

        .breadcrumb-item a, .breadcrumb-item.active {
            color: #e0f0ff !important;
        }

        h3, h5, p, .text-muted, label {
            color: #e0f0ff !important;
        }

        /* ── INPUTS ── */
        .form-control {
            background-color: rgba(255, 255, 255, 0.06) !important;
            border: 1px solid rgba(74, 144, 217, 0.3) !important;
            color: #e0f0ff !important;
        }

        .form-control:focus {
            background-color: rgba(255, 255, 255, 0.1) !important;
            border-color: rgba(116, 192, 252, 0.9) !important;
            box-shadow: 0 4px 12px rgba(30, 120, 255, 0.15) !important;
        }

        .header {
            margin-left: 0 !important;
            padding-left: 0 !important;
            left: 0 !important;
            width: 100vw !important;
        }

        .header-content {
            padding-left: 0 !important;
            padding-right: 0 !important;
            margin-left: 0 !important;
            margin-right: 0 !important;
        }


    </style>
</head>
<body>

<div class="grid-overlay"></div>
<canvas id="particles-canvas"></canvas>

<div id="main-wrapper">
    <div th:replace="fragments/navheader-teacher :: navheader-teacher"></div>
    <div th:replace="fragments/header :: header"></div>

    <div class="content-body">
        <div class="row mx-0">
            <div class="col p-md-0">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item active"><a th:href="@{/teacher}">Home</a></li>
                </ol>
            </div>
        </div>

        <div class="container-fluid">

            <div class="col-lg-5 mb-4">
                <div class="card p-4">
                    <h5 class="card-title text-center">Create a New Class</h5>

                    <form th:action="@{/teacher/create}" method="post" enctype="multipart/form-data">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                        <div class="form-group">
                            <input type="text" class="form-control input-rounded"
                                   name="name" placeholder="Enter Class Name (e.g., English 10)" required>
                        </div>

                        <div class="custom-file mb-3">
                            <input type="file" class="custom-file-input" id="classPic"
                                   name="banner" accept="image/*">
                            <label class="custom-file-label" for="classPic">Upload Class Banner (Optional)</label>
                        </div>
                        <small class="form-text text-muted mb-3"
                               style="color: rgba(255, 255, 255, 0.8) !important;">
                            Recommended size: 1200×400 px. Max 5 MB.
                        </small>

                        <div class="text-right">
                            <button type="submit" class="btn btn-success btn-rounded px-4">Create Class</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="row">
                <div class="col">
                    <h3 class="d-inline">My Classes</h3>
                    <p class="text-muted">Click a class to manage quizzes and view students.</p>

                    <div class="row" th:if="${!#lists.isEmpty(classes)}">
                        <div class="col-md-6 col-lg-3 mb-4" th:each="c : ${classes}">
                            <div class="card shadow-sm class-card"
                                 style="cursor: pointer; overflow: hidden;"
                                 th:onclick="|window.location.href='/teacher/class/' + ${c.id}|">

                                <img class="class-banner"
                                     style="height: 160px; object-fit: cover; width: 100%;"
                                     th:src="@{|/classroom/${c.id}/banner|}"
                                     alt="Class Banner" />

                                <div class="card-body">
                                    <h5 class="card-title" th:text="${c.name}">Class Name</h5>

                                    <p class="mb-1">
                                        <i class="fa fa-users text-primary"></i>
                                        <span class="text-muted"
                                              th:text="${c.students.size()} + ' student(s)'">0 student(s)</span>
                                    </p>

                                    <p class="mb-0">
                                        <strong>Code:</strong>
                                        <span th:id="'classCode_' + ${c.id}"
                                              th:text="${c.code}"
                                              th:onclick="|event.stopPropagation(); copyClassCode('classCode_' + ${c.id}, 'copyFeedback_' + ${c.id})|"
                                              class="text-primary class-code copy-code"
                                              title="Click to copy code">
                                        </span>
                                        <small th:id="'copyFeedback_' + ${c.id}"
                                               class="text-success ml-2"
                                               style="display: none;">Copied!</small>
                                    </p>
                                </div>

                                <div class="card-footer" style="background: transparent; border-top: 1px solid rgba(255,255,255,0.05);">
                                    <small class="text-muted">
                                        Created by: <span th:text="${c.teacher.name}"></span>
                                    </small>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div th:if="${#lists.isEmpty(classes)}" class="text-center mt-4">
                        <p class="text-muted">You haven't created any classes yet. Use the form above to create one.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div th:replace="fragments/footer :: footer"></div>
</div>

<script th:src="@{/plugins/common/common.min.js}"></script>
<script th:src="@{/js/custom.min.js}"></script>
<script th:src="@{/js/settings.js}"></script>
<script th:src="@{/js/gleek.js}"></script>
<script th:src="@{/js/styleSwitcher.js}"></script>
<script th:src="@{/plugins/chart.js/Chart.bundle.min.js}"></script>
<script th:src="@{/plugins/circle-progress/circle-progress.min.js}"></script>
<script th:src="@{/plugins/d3v3/index.js}"></script>
<script th:src="@{/plugins/topojson/topojson.min.js}"></script>
<script th:src="@{/plugins/datamaps/datamaps.world.min.js}"></script>
<script th:src="@{/plugins/raphael/raphael.min.js}"></script>
<script th:src="@{/plugins/morris/morris.min.js}"></script>
<script th:src="@{/plugins/moment/moment.min.js}"></script>
<script th:src="@{/plugins/pg-calendar/js/pignose.calendar.min.js}"></script>
<script th:src="@{/plugins/chartist/js/chartist.min.js}"></script>
<script th:src="@{/plugins/chartist-plugin-tooltips/js/chartist-plugin-tooltip.min.js}"></script>
<script th:src="@{/js/dashboard/dashboard-1.js}"></script>
<script th:src="@{/js/teacher-dashboard.js}"></script>

<script>
    (function () {
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let W, H, particles = [];

        function resize() {
            W = canvas.width  = window.innerWidth;
            H = canvas.height = Math.max(document.documentElement.scrollHeight, window.innerHeight);
        }
        window.addEventListener('resize', resize);
        resize();

        const COUNT = 72;
        const COLORS = ['rgba(80,160,255,', 'rgba(120,200,255,', 'rgba(200,230,255,', 'rgba(30,100,220,'];

        for (let i = 0; i < COUNT; i++) {
            particles.push({
                x: Math.random() * W,
                y: Math.random() * H,
                r: Math.random() * 1.6 + 0.3,
                dx: (Math.random() - 0.5) * 0.35,
                dy: (Math.random() - 0.5) * 0.35,
                color: COLORS[Math.floor(Math.random() * COLORS.length)],
                alpha: Math.random() * 0.5 + 0.15,
                pulse: Math.random() * Math.PI * 2,
            });
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);
            particles.forEach(p => {
                p.pulse += 0.012;
                const a = p.alpha + Math.sin(p.pulse) * 0.12;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = p.color + Math.min(1, Math.max(0, a)) + ')';
                ctx.fill();

                particles.forEach(q => {
                    const dist = Math.hypot(p.x - q.x, p.y - q.y);
                    if (dist < 130) {
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(q.x, q.y);
                        ctx.strokeStyle = `rgba(60,130,255,${0.06 * (1 - dist / 130)})`;
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                });

                p.x += p.dx; p.y += p.dy;
                if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
                if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
            });
            requestAnimationFrame(draw);
        }
        draw();
    })();
</script>

</body>
</html>
