<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="theme-name" content="quixlab" />

    <title>Header</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" crossorigin="anonymous">

    <link rel="icon" type="image/png" sizes="16x16" th:href="@{/images/favicon.png}">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <style>
        .header {
            background: rgba(8, 20, 45, 0.7) !important;
            background-image: none !important;
            backdrop-filter: blur(15px) !important;
            -webkit-backdrop-filter: blur(15px) !important;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15) !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            position: relative;
        }

        .header::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(127, 127, 255, 0.08), transparent);
            z-index: -1;
        }

        .header-logo img {
            height: 40px;
            width: auto;
            object-fit: contain;
            filter: brightness(1.3) drop-shadow(0 0 10px rgba(127, 127, 255, 0.5));
            transition: all 0.3s ease;
        }

        .header-logo img:hover {
            filter: brightness(1.5) drop-shadow(0 0 15px rgba(127, 127, 255, 0.8));
            transform: scale(1.05);
        }

        /* ── FIXED GEAR BUTTON STYLING ── */
        /* Targets the image directly to remove any borders or shadows */
        .header .user-img img {
            border: none !important; /* Removes the white circle border */
            box-shadow: none !important; /* Removes the external glow/outline */
            border-radius: 0 !important; /* Ensures no rounding is forced by default */
            background: transparent !important; /* Prevents background color leakage */
            padding: 0 !important; /* Removes internal spacing */
            transition: all 0.3s ease;
        }

        /* Targets the container to ensure no background circles are visible */
        .header .user-img.position-relative {
            border: none !important;
            background: none !important;
            box-shadow: none !important;
        }

        .header .user-img img:hover {
            transform: scale(1.1);
            filter: brightness(1.2) drop-shadow(0 0 5px rgba(127, 127, 255, 0.5));
        }

        .header .activity.active {
            background: #4CAF50;
            box-shadow: 0 0 10px rgba(76, 175, 80, 0.6);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 10px rgba(76, 175, 80, 0.6);
            }
            50% {
                box-shadow: 0 0 20px rgba(76, 175, 80, 0.9);
            }
        }

        .drop-down.dropdown-profile {
            background: rgba(255, 255, 255, 0.15) !important;
            backdrop-filter: blur(20px) !important;
            -webkit-backdrop-filter: blur(20px) !important;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            animation: fadeInDown 0.3s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .dropdown-content-body ul li a,
        .dropdown-content-body ul li button {
            color: white !important;
            transition: all 0.3s ease;
            padding: 12px 20px;
            border-radius: 8px;
            margin: 5px 10px;
        }

        .dropdown-content-body ul li a:hover,
        .dropdown-content-body ul li button:hover {
            background: rgba(127, 127, 255, 0.2) !important;
            transform: translateX(5px);
        }

        .dropdown-content-body ul li a i,
        .dropdown-content-body ul li button i {
            filter: drop-shadow(0 0 5px rgba(127, 127, 255, 0.5));
            margin-right: 8px;
        }

        .hamburger .toggle-icon {
            color: white;
            filter: drop-shadow(0 0 8px rgba(127, 127, 255, 0.5));
            transition: all 0.3s ease;
        }

        .hamburger:hover .toggle-icon {
            filter: drop-shadow(0 0 12px rgba(127, 127, 255, 0.8));
            transform: scale(1.1);
        }

        .header-content {
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            padding-left: 0 !important;
            padding-right: 0 !important;
            position: relative !important;
        }

        #cerebra1 {
            color: #e0f0ff !important;
            text-shadow: 0 0 15px rgba(60, 150, 255, 0.6);
            margin: 0 auto !important;
            position: absolute !important;
            left: 50% !important;
            transform: translateX(-50%) !important;
            white-space: nowrap;
        }

        .header-left {
            display: flex;
            align-items: center;
        }

        i.fa, i[class*="icon-"] {
            display: inline-block;
            font-style: normal;
            font-variant: normal;
            text-rendering: auto;
            -webkit-font-smoothing: antialiased;
        }

        .header-content {
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            padding-left: 0 !important;
            padding-right: 0 !important;
            position: relative !important;
            width: 100% !important;
            margin-left: 0 !important;
        }

        #cerebra1 {
            color: #e0f0ff !important;
            text-shadow: 0 0 15px rgba(60, 150, 255, 0.6);
            margin: 0 !important;
            position: absolute !important;
            left: 0 !important;
            right: 0 !important;
            text-align: center !important;
            width: 100% !important;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div th:fragment="header" class="header">
    <div class="header-content clearfix" style="position: relative; display: flex; align-items: center; justify-content: center;">

        <!-- Hamburger - absolute left -->
        <div class="header-left" style="position: absolute; left: 15px;">
            <div class="nav-control">
                <div class="hamburger">
                    <span class="toggle-icon"><i class="fa fa-bars"></i></span>
                </div>
            </div>
        </div>

        <!-- Centered Title -->
        <h3 id="cerebra1" style="margin: 0; text-align: center;">Cerebro Metron</h3>

        <!-- Gear icon - absolute right -->
        <div class="header-right" style="position: absolute; right: 15px;">
            <ul class="clearfix">
                <li class="icons dropdown">
                    <div class="user-img c-pointer position-relative" data-toggle="dropdown" style="border: none !important;">
                        <img th:src="@{/images/imgs/12.png}" height="40" width="40" alt="Settings" style="border: none !important; box-shadow: none !important;">
                    </div>
                    <div class="drop-down dropdown-profile animated fadeIn dropdown-menu">
                        <div class="dropdown-content-body">
                            <ul>
                                <li>
                                    <a href="javascript:void(0)">
                                        <i class="fa fa-user"></i>
                                        <span th:text="${#authentication.principal.name}">Profile</span>
                                    </a>
                                </li>
                                <li>
                                    <form th:action="@{/logout}" method="post" style="display: inline;">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                        <button type="submit" class="dropdown-item" style="border: none; background: none; cursor: pointer; width: 100%; text-align: left;">
                                            <i class="fa fa-sign-out"></i> <span>Logout</span>
                                        </button>
                                    </form>
                                </li>
                            </ul>
                        </div>
                    </div>
                </li>
            </ul>
        </div>
    </div>
</div>

</body>
</html>
